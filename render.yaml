services:
  - type: web
    name: ghostzin-zk-bank
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: ghostzin-data
      mountPath: /data
      sizeGB: 1
